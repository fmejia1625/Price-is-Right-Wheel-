<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Showcase Showdown</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(255,187,92,0.18),_transparent_28%),linear-gradient(180deg,_#0d4fa6_0%,_#0a366d_55%,_#07111f_100%)] text-white antialiased">
    <div class="app-shell mx-auto my-6 max-w-7xl rounded-[32px] border border-white/20 bg-slate-950/70 p-6 shadow-[0_30px_90px_rgba(0,0,0,0.35)] backdrop-blur-xl">
        <div class="mb-5 flex items-center justify-center">
            <div class="rounded-full border border-amber-300/30 bg-gradient-to-r from-amber-300/20 via-orange-200/15 to-amber-300/20 px-5 py-2 text-sm font-black uppercase tracking-[0.35em] text-amber-100 shadow-[0_0_30px_rgba(255,204,77,0.15)]">
                Digital Showcase Showdown
            </div>
        </div>
        <div class="top-bar mb-6 rounded-2xl border border-white/10 bg-white/10 px-4 py-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.16)]">
            <div class="team-inputs flex flex-wrap gap-3">
                <input class="min-w-[220px] rounded-full border border-amber-300/30 bg-slate-950/70 px-4 py-3 text-sm font-semibold text-white shadow-[inset_0_1px_2px_rgba(255,255,255,0.08)] outline-none ring-0 transition focus:border-amber-300/50 focus:ring-2 focus:ring-amber-300/15" type="text" id="teamOneName" placeholder="Team 1 Name">
                <input class="min-w-[220px] rounded-full border border-amber-300/30 bg-slate-950/70 px-4 py-3 text-sm font-semibold text-white shadow-[inset_0_1px_2px_rgba(255,255,255,0.08)] outline-none ring-0 transition focus:border-amber-300/50 focus:ring-2 focus:ring-amber-300/15" type="text" id="teamTwoName" placeholder="Team 2 Name">
                <input class="min-w-[220px] rounded-full border border-amber-300/30 bg-slate-950/70 px-4 py-3 text-sm font-semibold text-white shadow-[inset_0_1px_2px_rgba(255,255,255,0.08)] outline-none ring-0 transition focus:border-amber-300/50 focus:ring-2 focus:ring-amber-300/15" type="text" id="teamThreeName" placeholder="Team 3 Name">
            </div>
        </div>

        <div class="scoreboard mb-6 grid gap-3 md:grid-cols-3">
            <div class="score-card rounded-2xl border border-white/10 bg-white/10 p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.12)]">
                <span class="label">Current Team</span>
                <span id="currentPlayer">---</span>
            </div>
            <div class="score-card rounded-2xl border border-white/10 bg-white/10 p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.12)]">
                <span class="label">Spin</span>
                <span id="spinNumber">1</span>
            </div>
            <div class="score-card rounded-2xl border border-white/10 bg-white/10 p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.12)]">
                <span class="label">Round Total</span>
                <span id="totalScore">0</span>
            </div>
        </div>

        <div class="play-area flex flex-col gap-6 lg:flex-row lg:items-start lg:justify-center">
            <div class="wheel-column">
                <div class="wheel-stage relative">
                    <div class="pointer"></div>
                    <canvas id="wheel" width="800" height="800"></canvas>
                </div>
            </div>

            <div class="side-column rounded-[24px] border border-white/10 bg-slate-900/70 p-5 shadow-[0_20px_45px_rgba(0,0,0,0.24)]">
                <div id="result" class="min-h-[80px] rounded-2xl border border-white/10 bg-gradient-to-r from-white/10 to-white/5 px-4 py-3 text-left text-2xl font-black text-amber-300 shadow-[inset_0_1px_0_rgba(255,255,255,0.12)]">Press SPIN to start the round.</div>
                <button class="mt-3 w-full rounded-full bg-gradient-to-r from-amber-300 via-orange-400 to-amber-500 px-5 py-3 font-black uppercase tracking-[0.2em] text-slate-950 shadow-[0_10px_24px_rgba(255,170,0,0.30)] transition hover:-translate-y-0.5 hover:shadow-[0_14px_30px_rgba(255,170,0,0.38)]" id="spinBtn">SPIN THE WHEEL</button>
                <div id="decisionControls" class="mt-3 flex gap-3">
                    <button class="flex-1 rounded-full bg-gradient-to-r from-amber-300 via-orange-400 to-amber-500 px-4 py-3 font-black uppercase tracking-[0.18em] text-slate-950 shadow-[0_10px_24px_rgba(255,170,0,0.24)]" id="stayBtn">STAY</button>
                    <button class="flex-1 rounded-full bg-gradient-to-r from-amber-300 via-orange-400 to-amber-500 px-4 py-3 font-black uppercase tracking-[0.18em] text-slate-950 shadow-[0_10px_24px_rgba(255,170,0,0.24)]" id="spinAgainBtn">SPIN AGAIN</button>
                </div>
                <div id="tracker" class="mt-4 rounded-2xl border border-white/10 bg-white/10 p-4 shadow-[inset_0_1px_0_rgba(255,255,255,0.12)]">
                    <h3 class="mb-3 text-sm font-black uppercase tracking-[0.22em] text-amber-200">Round Tracker</h3>
                    <div id="teamTracker" class="flex flex-col gap-2">
                        <div id="team0Tracker" class="rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm">Team 1: -</div>
                        <div id="team1Tracker" class="rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm">Team 2: -</div>
                        <div id="team2Tracker" class="rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm">Team 3: -</div>
                    </div>
                </div>
                <div class="controls mt-4">
                    <button class="w-full rounded-full bg-gradient-to-r from-amber-300 via-orange-400 to-red-400 px-5 py-3 font-black uppercase tracking-[0.2em] text-slate-950 shadow-[0_10px_24px_rgba(255,160,0,0.24)] transition hover:-translate-y-0.5 hover:shadow-[0_14px_30px_rgba(255,160,0,0.32)]" id="resetBtn">Reset Game</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom-left button to mute/unmute the looping background music; icon and behavior are handled in wheel.js -->
    <button id="muteBtn" class="mute-btn" aria-label="Mute background music" title="Mute background music">🔊</button>

    <script src="wheel.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</body>

</html>
